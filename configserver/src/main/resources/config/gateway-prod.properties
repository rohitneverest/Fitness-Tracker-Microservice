spring.application.name=gateway
server.port=${SERVER_PORT:8765}

# Keycloak JWT
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_URI}

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL}

# Gateway Discovery
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# Routes
spring.cloud.gateway.server.webflux.routes[0].id=activityservice
spring.cloud.gateway.server.webflux.routes[0].uri=lb://ACTIVITYSERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/activities/**

spring.cloud.gateway.server.webflux.routes[1].id=userservice
spring.cloud.gateway.server.webflux.routes[1].uri=lb://USERSERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/users/**

spring.cloud.gateway.server.webflux.routes[2].id=aiservice
spring.cloud.gateway.server.webflux.routes[2].uri=lb://AISERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/recommendations/**

spring.cloud.gateway.server.webflux.routes[3].id=waterservice
spring.cloud.gateway.server.webflux.routes[3].uri=lb://WATERSERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/water/**